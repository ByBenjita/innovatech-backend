version: '3.8'

services:
  backend:
    image: bybenjita/innovatech-backend:latest
    container_name: innovatech_backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=172.31.3.198
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=innovatech
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - innovatech-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: innovatech_db
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=innovatech
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  innovatech-network:
    driver: bridge